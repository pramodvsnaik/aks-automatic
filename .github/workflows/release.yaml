name: deploy-aks-automatic
on:
 workflow_dispatch:
 
permissions:
  id-token: write

  
jobs:
  deploy-aks-automatic:
    runs-on: ubuntu-latest
    steps:
        - name: checkout
          uses: actions/checkout@v6.0.2

        - name: Azure Login
          uses: Azure/login@v3
          with:
            client-id: ${{ secrets.AZURE_CLIENT_ID }}
            tenant-id: ${{ secrets.AZURE_TENANT_ID }}
            subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}  

        - name: deploy-aks-echo2
          uses:  azure/cli@v2
          with:
            azcliversion: latest
            inlineScript: |
               az account show
 
        - name: deploy-aks1
          run: |
            ${{github.workspace}}/automatic/custom-network/private/sh/define-vars.sh
             ls ${{ github.workspace }}
             echo ${{ env.AZURE_CLIENT_ID }}
             echo ${{ env.AZURE_SUBSCRIPTION_ID }}
             echo ${{ env.AZURE_TENANT_ID }}
             echo ${{ env.VNET_NAME }}
             echo ${{ env.RG_NAME }}

          
    
