name: Run Azure Login with OIDC
on: [push]

 
permissions:
  id-token: write
  contents: read
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      - name: 'Checking out repo code'
        uses: actions/checkout@v6
      
      - name: 'Az CLI login'
        uses: azure/login@8c334a195cbb38e46038007b304988d888bf676a
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 'Run az commands'
        run: |
          az account show
          az group list

      - name: 'Set ENV Variables'
        run: |
          pwd
          bash automatic/custom-network/public/sh/define-vars.sh
          printenv | sort
           bash automatic/custom-network/public/sh/create-rg.sh
           bash automatic/custom-network/public/sh/create-uami.sh
           bash automatic/custom-network/public/sh/create-vnet.sh
           bash automatic/custom-network/public/sh/create-aks.sh
          
      - name: 'Set ENV Variables'
        run: |
         echo "${{ env.RG_NAME }}"
         echo "${{ env.VNET_NAME }}"
         echo "${{ env.CLUSTER_NAME }}"
         echo "${{ env.IDENTITY_NAME }}"
